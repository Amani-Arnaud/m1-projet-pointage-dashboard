version: '3'
services:
  app:
    build: .
    container_name: pointage-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    networks:
      - laravel_network
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=pointage
      - DB_USERNAME=root
      - DB_PASSWORD=
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pointage
      MYSQL_USER: root
      MYSQL_PASSWORD: 
    volumes:
      - ./docker/mysql/pointage.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge
